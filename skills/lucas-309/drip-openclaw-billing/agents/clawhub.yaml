skill:
  name: "drip-openclaw-billing"
  display_name: "Drip OpenClaw Billing"
  description: "Instrument OpenClaw requests with Drip run/event/usage telemetry."
  invocation_mode: "explicit_only"

runtime:
  model: "gpt-5"
  timeout_ms: 60000
  retries: 2
  fail_open_telemetry: true

environment:
  required:
    - "DRIP_API_KEY"
    - "DRIP_WORKFLOW_ID"
  optional:
    - "DRIP_BASE_URL"
    - "OPENCLAW_DEFAULT_CUSTOMER_ID"
    - "OPENCLAW_TELEMETRY_FAIL_OPEN"
    - "BRAVE_API_KEY"
    - "GOOGLE_API_KEY"

identity_mapping:
  request_id_priority:
    - "request.requestId"
    - "params.requestId"
    - "params.runId"
    - "deterministic_hash(action, requesterId, tenantId, params)"
  customer_id_priority:
    - "params.customerId"
    - "tenant:{request.tenantId}"
    - "tenant:{params.tenantId}"
    - "requester:{request.requesterId}"
    - "OPENCLAW_DEFAULT_CUSTOMER_ID"

tools:
  run_lifecycle:
    start:
      method: "POST"
      path: "/v1/runs"
    end:
      method: "PATCH"
      path: "/v1/runs/:id"
  execution_events:
    method: "POST"
    path: "/v1/events"
    event_type_default: "TOOL_CALL"
    action_name_map:
      brave: "brave_search"
      google: "google_search"
      default: "<provider>_call"
  usage_billing:
    method: "POST"
    path: "/v1/usage"
    usage_type_default: "api_calls"
    provider_meter_pattern: "<provider>_api_calls"

billing_meters:
  - "api_calls"
  - "brave_api_calls"
  - "google_api_calls"
  - "openclaw_track_usage_calls"
  - "openclaw_record_run_calls"

verification:
  checks:
    - "Run appears in timeline"
    - "Event appears with provider/endpoint/status/latency/queryHash"
    - "Usage appears with expected usageType and quantity"
    - "Charge appears when pricing plan exists"
